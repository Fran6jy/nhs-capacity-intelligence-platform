name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check src/ tests/
      - name: Type-check
        run: mypy src/ || true
      - name: Test
        run: pytest tests/ -v --cov=src
      - name: Build Docker
        run: docker build -f docker/Dockerfile -t nhs-capacity-app:ci .

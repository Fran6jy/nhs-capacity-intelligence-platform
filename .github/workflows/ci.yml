name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt   # lean, runnable core (scale-out infra lives in requirements-scale.txt)
      - name: Lint
        run: ruff check src/ tests/
      - name: Type-check
        run: mypy src/ || true
      - name: Test
        run: pytest tests/ --cov=src
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t nhs-capacity-app:ci .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check & build
        run: npm run build
        working-directory: frontend
